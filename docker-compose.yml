# Production: docker compose up -d
# Build: docker compose build

services:
  try-fastapi:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    env_file: ".env"
    restart: unless-stopped
    # Code and deps come from the image; no bind mounts.
    volumes:
      - try_fastapi_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  try_fastapi_logs:
