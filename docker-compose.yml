# version: '3'
services:
  try-fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: "uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file: ".env"
    restart: "always"
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  try-fastapi-tests:
    build:
      context: .
      dockerfile: Dockerfile
    command: "pytest tests"
    env_file: ".env"
    restart: "no"
    environment:
      - DATABASE_URL=${TEST_DATABASE_URL}
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
